name: Java CI with Maven and Playwright

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Install Dependencies and Compile
      working-directory: CraiglistAutomation
      run: mvn --batch-mode --no-transfer-progress clean install -DskipTests

    - name: Install Playwright OS Dependencies
      working-directory: CraiglistAutomation
      run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install-deps"

    - name: Run Maven Tests
      working-directory: CraiglistAutomation
      run: mvn --batch-mode --no-transfer-progress test

    - name: Generate Single HTML Test Report
      working-directory: CraiglistAutomation
      if: always()
      run: npx xunit-viewer -r target/surefire-reports -o target/test-report.html
      
    - name: Upload Single HTML Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: CraiglistAutomation/target/test-report.html
        retention-days: 14