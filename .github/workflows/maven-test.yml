name: Java CI with Maven and Playwright

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        cache: maven

    - name: Install Playwright OS Dependencies
      working-directory: CraiglistAutomation
      run: npx playwright install-deps

    - name: Run Maven Tests
      working-directory: CraiglistAutomation
      run: mvn --batch-mode --no-transfer-progress clean test

    - name: Generate Surefire HTML Report
      working-directory: CraiglistAutomation
      if: always() # Ensure the report executes even if tests fail
      run: mvn --batch-mode --no-transfer-progress surefire-report:report-only
      
    - name: Upload Surefire Test Report
      if: always() # Upload report even if the tests fail
      uses: actions/upload-artifact@v4
      with:
        name: surefire-test-report
        path: |
          CraiglistAutomation/target/site/
          CraiglistAutomation/target/surefire-reports/
        retention-days: 14